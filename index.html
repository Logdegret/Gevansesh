<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geven — Sesh with Excellence</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #534AB7;
      --purple-light: #EEEDfa;
      --purple-mid: #a39de8;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f9f9fc;
      --card-bg: #ffffff;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: clamp(2.4rem, 8vw, 3.8rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--purple);
      line-height: 1;
    }

    header p {
      margin-top: 0.4rem;
      font-size: 1rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── Card wrapper ────────────────────────────────────── */
    .panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      margin-bottom: 1.25rem;
    }

    .panel-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    /* ── Category buttons ────────────────────────────────── */
    .category-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .cat-btn {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.55rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;
      user-select: none;
    }

    .cat-btn:hover {
      border-color: var(--purple-mid);
      background: var(--purple-light);
    }

    .cat-btn.active {
      border-color: var(--purple);
      background: var(--purple);
      color: #fff;
    }

    .cat-btn:active { transform: scale(0.96); }

    /* ── Excellence slider ───────────────────────────────── */
    .slider-wrapper {
      position: relative;
      padding-top: 0.25rem;
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.65rem;
    }

    .slider-labels span {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .slider-labels span.current {
      color: var(--purple);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: var(--border);
      outline: none;
      cursor: pointer;
      background: linear-gradient(to right, var(--purple) var(--fill, 0%), var(--border) var(--fill, 0%));
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--purple);
      border: 3px solid #fff;
      box-shadow: 0 0 0 1.5px var(--purple);
      cursor: pointer;
      transition: box-shadow 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 4px rgba(83, 74, 183, 0.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--purple);
      border: 3px solid #fff;
      box-shadow: 0 0 0 1.5px var(--purple);
      cursor: pointer;
    }

    /* ── Generate button ─────────────────────────────────── */
    #generate-btn {
      width: 100%;
      padding: 0.95rem;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
    }

    #generate-btn:hover:not(:disabled) {
      background: #4540a3;
    }

    #generate-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    #generate-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* ── Results ─────────────────────────────────────────── */
    #results {
      display: none;
      flex-direction: column;
      gap: 1.1rem;
    }

    #results.visible {
      display: flex;
    }

    .results-heading {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 0.1rem;
    }

    /* ── Idea card ───────────────────────────────────────── */
    .idea-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      animation: fadeUp 0.35s ease both;
    }

    .idea-card:nth-child(2) { animation-delay: 0.07s; }
    .idea-card:nth-child(3) { animation-delay: 0.14s; }
    .idea-card:nth-child(4) { animation-delay: 0.21s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .idea-title {
      font-size: 1.08rem;
      font-weight: 700;
      margin-bottom: 0.55rem;
      line-height: 1.3;
    }

    .idea-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    /* ── Badges ──────────────────────────────────────────── */
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.28rem 0.7rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge-difficulty {
      background: #fff3e0;
      color: #b35900;
    }

    .badge-difficulty.high {
      background: #fde8e8;
      color: #b91c1c;
    }

    .badge-confusion {
      background: #ede9fe;
      color: var(--purple);
    }

    .badge-excellence {
      background: #fef9c3;
      color: #854d0e;
    }

    /* ── Pro tip ─────────────────────────────────────────── */
    .pro-tip {
      border-left: 3px solid var(--purple);
      padding: 0.65rem 0.9rem;
      background: var(--purple-light);
      border-radius: 0 8px 8px 0;
      font-size: 0.85rem;
      line-height: 1.5;
      color: #3730a3;
    }

    .pro-tip strong {
      font-size: 0.7rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.25rem;
      color: var(--purple);
    }

    /* ── Error ───────────────────────────────────────────── */
    .error-card {
      background: #fde8e8;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* ── Skeleton loader ─────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f8 25%, #e4e4f4 50%, #f0f0f8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .skel-line {
      height: 14px;
      margin-bottom: 10px;
    }

    .skel-title { width: 65%; height: 18px; }
    .skel-desc1 { width: 100%; }
    .skel-desc2 { width: 85%; }
    .skel-badges { width: 55%; height: 24px; margin-top: 14px; }
    .skel-tip { width: 90%; height: 38px; margin-top: 14px; border-radius: 0 8px 8px 0; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 420px) {
      .panel { padding: 1.25rem; }
      header h1 { font-size: 2.8rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <header>
    <h1>Geven</h1>
    <p>Sesh with excellence</p>
  </header>

  <!-- Category selector -->
  <div class="panel">
    <p class="panel-label">Target Category</p>
    <div class="category-grid">
      <button class="cat-btn active" data-value="Backpack">🎒 Backpack</button>
      <button class="cat-btn" data-value="Supplies">✏️ Supplies</button>
      <button class="cat-btn" data-value="Snacks">🥤 Snacks</button>
      <button class="cat-btn" data-value="Seat">🪑 Seat</button>
      <button class="cat-btn" data-value="Anything">⚡ Anything</button>
    </div>
  </div>

  <!-- Excellence level -->
  <div class="panel">
    <p class="panel-label">Excellence Level</p>
    <div class="slider-wrapper">
      <div class="slider-labels">
        <span id="lbl-0">Casual</span>
        <span id="lbl-1">Intermediate</span>
        <span id="lbl-2">Legendary</span>
      </div>
      <input type="range" id="excellence-slider" min="0" max="2" step="1" value="0" />
    </div>
  </div>

  <!-- Generate button -->
  <button id="generate-btn">Generate Sesh Ideas</button>

  <!-- Results -->
  <div id="results" style="margin-top: 1.5rem;"></div>

</div>

<script>
  // ── Config ───────────────────────────────────────────────────────────────
  const API_KEY = 'AIzaSyDRQrh9YnlIsrn-gilmT0Af_rSyde28iFg';
  const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-04-17:generateContent?key=${API_KEY}`;

  const LEVELS = ['Casual', 'Intermediate', 'Legendary'];

  // ── State ────────────────────────────────────────────────────────────────
  let selectedCategory = 'Backpack';
  let selectedLevel    = 0;

  // ── Category buttons ─────────────────────────────────────────────────────
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedCategory = btn.dataset.value;
    });
  });

  // ── Excellence slider ─────────────────────────────────────────────────────
  const slider = document.getElementById('excellence-slider');

  function updateSlider(val) {
    selectedLevel = parseInt(val);
    const pct = (selectedLevel / 2) * 100;
    slider.style.setProperty('--fill', pct + '%');

    document.querySelectorAll('.slider-labels span').forEach((el, i) => {
      el.classList.toggle('current', i === selectedLevel);
    });
  }

  slider.addEventListener('input', e => updateSlider(e.target.value));
  updateSlider(0);

  // ── Generate ──────────────────────────────────────────────────────────────
  const btn     = document.getElementById('generate-btn');
  const results = document.getElementById('results');

  btn.addEventListener('click', generate);

  async function generate() {
    btn.disabled   = true;
    btn.textContent = 'Consulting the ancients...';

    results.classList.add('visible');
    results.innerHTML = skeletons();

    try {
      const level    = LEVELS[selectedLevel];
      const category = selectedCategory;

      const systemPrompt = `You are Geven — an elite Gevan Sesh strategist. Your job is to generate creative, funny, and harmless ideas for Gevan Seshes — sneakily borrowing and hiding Gevan's personal items without him noticing, for as long as possible. Nothing is ever damaged or permanently taken — the goal is maximum confusion and comedy. Return ONLY a valid JSON array of exactly 3 objects with keys: title (string), description (string, 2-3 sentences), difficulty (number 1-10), confusion (number 1-10), excellence (number 1-5), tip (string). No markdown, no explanation — just raw JSON.`;

      const userPrompt = `Generate 3 ${level} sesh ideas targeting: ${category}`;

      const body = {
        systemInstruction: { parts: [{ text: systemPrompt }] },
        contents: [{ role: 'user', parts: [{ text: userPrompt }] }],
        generationConfig: { temperature: 1.1, maxOutputTokens: 1024 }
      };

      const res = await fetch(API_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body)
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `API error ${res.status}`);
      }

      const data = await res.json();
      const raw  = data?.candidates?.[0]?.content?.parts?.[0]?.text ?? '';

      // Strip any accidental markdown fences
      const cleaned = raw.replace(/```json\s*/gi, '').replace(/```\s*/gi, '').trim();
      const ideas   = JSON.parse(cleaned);

      if (!Array.isArray(ideas) || ideas.length < 3) throw new Error('Unexpected response shape.');

      results.innerHTML = '';
      results.insertAdjacentHTML('afterbegin', `<p class="results-heading">3 ideas generated — ${level} · ${category}</p>`);
      ideas.slice(0, 3).forEach(idea => {
        results.insertAdjacentHTML('beforeend', ideaCard(idea));
      });

    } catch (err) {
      results.innerHTML = `<div class="error-card">Something went wrong: ${escHtml(err.message)}</div>`;
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Generate Sesh Ideas';
    }
  }

  // ── Templates ─────────────────────────────────────────────────────────────
  function ideaCard(idea) {
    const stars  = '★'.repeat(Math.min(5, Math.max(1, idea.excellence))) +
                   '☆'.repeat(5 - Math.min(5, Math.max(1, idea.excellence)));
    const diff   = Math.min(10, Math.max(1, idea.difficulty));
    const highD  = diff >= 7 ? ' high' : '';

    return `
    <div class="idea-card">
      <p class="idea-title">${escHtml(idea.title)}</p>
      <p class="idea-desc">${escHtml(idea.description)}</p>
      <div class="badges">
        <span class="badge badge-difficulty${highD}">🔥 Difficulty ${diff}/10</span>
        <span class="badge badge-confusion">🌀 Confusion ${Math.min(10, Math.max(1, idea.confusion))}/10</span>
        <span class="badge badge-excellence">✨ ${stars}</span>
      </div>
      <div class="pro-tip">
        <strong>Pro Tip</strong>
        ${escHtml(idea.tip)}
      </div>
    </div>`;
  }

  function skeletons() {
    const s = `
    <div class="skeleton-card">
      <div class="skeleton skel-line skel-title"></div>
      <div class="skeleton skel-line skel-desc1"></div>
      <div class="skeleton skel-line skel-desc2"></div>
      <div class="skeleton skel-line skel-badges"></div>
      <div class="skeleton skel-line skel-tip"></div>
    </div>`;
    return s + s + s;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
